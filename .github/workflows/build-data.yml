name: Build ramen data

on:
  push:
    paths:
      - "package.json"
      - "data/excel/**.xlsx"
      - "scripts/**.mjs"
      - "docs/index.html"
      - "docs/*.js"
      - "data/style/type-profiles.json"
      - ".github/workflows/build-data.yml"
  workflow_dispatch:

concurrency:
  group: build-ramen-data-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Syntax check
        run: npm run check

      - name: Build JSON
        run: npm run build:data

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if ! git diff --cached --quiet; then
            git commit -m "build: update generated ramen data"
            git push
          fi
