<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (() => {
      const path = window.location.pathname;
      const lastSegment = path.split("/").pop() || "";
      if (path !== "/" && !path.endsWith("/") && !lastSegment.includes(".")) {
        window.location.replace(`${path}/${window.location.search}${window.location.hash}`);
      }
    })();
  </script>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'none'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://unpkg.com; connect-src 'self' https://wmq452wmcd.execute-api.ap-east-2.amazonaws.com; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>拉麵店分類地圖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">
      <h1>拉麵店搜尋器</h1>
      <span class="topbar-sub">RAMEN FINDER</span>
    </div>
    <div class="meta-block">
      <span id="data-updated-at">資料載入中</span>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>資料來源</h2>
        <label>縣市<select id="region-select"></select></label>
      </section>

      <section class="panel">
        <h2>篩選</h2>
        <label>關鍵字<input id="keyword-input" type="text" placeholder="店名、地址、商圈" /></label>
        <label>地區<select id="district-select"><option value="">全部</option></select></label>
        <label>商圈 / 路段<select id="area-select"><option value="">全部</option></select></label>
        <label>四字類型<select id="style-select"><option value="">全部</option></select></label>
        <label>最低評分<select id="rating-select"><option value="">不限</option><option value="4.5">4.5+</option><option value="4.0">4.0+</option><option value="3.5">3.5+</option></select></label>
        <label>價格區間<select id="price-select"><option value="">不限</option><option value="under-200">$200 以下</option><option value="200-300">$200–$300</option><option value="300-400">$300–$400</option><option value="over-400">$400 以上</option></select></label>
        <button id="sort-count-btn" type="button">依評論數排序</button>
      </section>

      <section class="panel">
        <h2>分類說明</h2>
        <div id="style-help" class="style-help">請先選擇一個類型。</div>
      </section>

      <section class="panel stats">
        <h2>結果統計</h2>
        <div id="result-count">0 間</div>
      </section>
    </aside>

    <section class="content">
      <div id="map"></div>
      <div class="chip-filter-bar" id="chip-filter-bar">
        <div class="chip-section">
          <input class="chip-search" id="chip-search" type="text" placeholder="搜尋店名、地址…" />
        </div>
        <div class="chip-section chip-selects">
          <select id="m-region-select"></select>
          <select id="m-district-select"><option value="">地區</option></select>
          <select id="m-area-select"><option value="">商圈 / 路段</option></select>
          <select id="m-style-select"><option value="">類型</option></select>
          <select id="m-price-select"><option value="">價格</option><option value="under-200">$200 以下</option><option value="200-300">$200–$300</option><option value="300-400">$300–$400</option><option value="over-400">$400 以上</option></select>
        </div>
        <div class="chip-section" id="chip-rating-row"></div>
      </div>
      <div class="bottom-grid">
        <div id="shop-list" class="shop-list"></div>
        <aside class="detail-panel">
          <div class="detail-header" id="detail-header">
            <h2 id="detail-title">店家詳細</h2>
            <span class="detail-toggle-text" id="detail-chevron">更多詳細</span>
          </div>
          <div id="detail-content" class="detail-content">請先從列表或地圖選擇一家店。</div>
        </aside>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="./security.js"></script>
  <script src="./config.js"></script>
  <script src="./tracking.js"></script>
  <script src="./app.js"></script>

  <footer class="privacy-notice">
    本平台會收集匿名化使用資料，例如店家點擊與地圖導流，用於改善推薦品質與分析整體導流成效。本平台不收集姓名、電話、Email 等可直接識別個人的資料。
  </footer>
</body>
</html>
